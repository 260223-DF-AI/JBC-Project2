<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-mono antialiased">

    <div class="max-w-6xl mx-auto mt-12 px-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">API logs</h1>
                <p class="text-gray-400 text-sm">Real-time output from logs/log.log</p>
            </div>
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center">
                ← Back to Dashboard
            </a>
        </div>

        <div class="bg-black rounded-lg border border-gray-700 shadow-2xl overflow-hidden">
            <div class="bg-gray-800 px-4 py-2 border-b border-gray-700 flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <pre id="log-content" class="p-6 text-sm leading-relaxed overflow-y-auto max-h-[70vh] whitespace-pre-wrap">
[SYSTEM] Initializing log viewer...
[SYSTEM] Attempting to fetch logs from server...
            </pre>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const logContainer = document.getElementById('log-content');

        async function fetchLogs() {
            try {
                // request log info from logs endpoint
                const response = await fetch(`${API_BASE_URL}/logs`);
                if (!response.ok) throw new Error('Could not fetch log file.');
                
                const text = await response.text();
                logContainer.textContent = text;
                
                // auto-scroll to bottom
                logContainer.scrollTop = logContainer.scrollHeight;
            } catch (err) {
                logContainer.innerHTML += `\n<span class="text-red-500">[ERROR] ${err.message}</span>`;
            }
        }

        // Fetch logs on load
        fetchLogs();
        // Refresh every 5 seconds
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
