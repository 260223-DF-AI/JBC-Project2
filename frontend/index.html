<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBC API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="max-w-6xl mx-auto mt-12 px-4 sm:px-6 lg:px-8">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-gray-900 tracking-tight">JBC Sales Data</h1>
                <p class="mt-2 text-lg text-gray-500" id="header_caption">Trusted Data Analysts, since</p>
            </div>
            <div>
                <a href="logs.html" 
                class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    View Logs
                </a>
            </div>
        </header>

        <div class="bg-white shadow-sm rounded-xl border border-gray-200 mb-8 overflow-hidden">
            <div class="p-6">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-4">
                        <label for="requestDropdown" class="font-medium text-gray-700">Select Request:</label>
                        <select id="requestDropdown" 
                                class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">-- Choose a request --</option>
                        </select>
                        <button id="executeButton"
                                class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                                disabled>
                            Execute
                        </button>
                    </div>
                    <div id="parametersContainer" class="flex flex-col gap-3">
                        <!-- dynamically insert requests here -->
                    </div>
                </div>
                <div id="status-message" class="mt-4 text-sm font-medium h-5"></div>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-xl border border-gray-200 overflow-hidden">
            <div class="max-h-[600px] overflow-y-auto">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="sticky top-0 bg-gray-50 border-b border-gray-200" id="table-head">
                        
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="table-body">
                        <!-- dynamically build table here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
